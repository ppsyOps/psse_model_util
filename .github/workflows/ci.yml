name: CI

on:
  push:
  pull_request:

jobs:
  lint:
    name: Lint (Ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install PDM
        run: pip install pdm

      - name: Install lint dependencies
        run: pdm install -G lint

      - name: Run Ruff
        run: pdm run ruff check .

  test:
    name: Test & Coverage
    runs-on: ubuntu-latest
    needs: lint
    env:
      # Redirect platformdirs' site_data_dir away from the default
      # `/usr/local/share` (root-only on the GHA runner) into a writable
      # user-space path so Model.__init__'s pickle cache can be written.
      XDG_DATA_DIRS: /tmp/psse-site-data
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install PDM
        run: pip install pdm

      - name: Install all dependencies
        run: pdm install

      - name: Run pytest with coverage
        run: pdm run pytest --cov=psse_model_util --cov-report=xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  build:
    name: Build (Hatch)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install PDM
        run: pip install pdm hatch

      - name: Install dependencies
        run: pdm install -G dev

      - name: Build package
        run: pdm run hatch build

  docs:
    name: Docs (Sphinx)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install package + docs deps
        # autodoc imports the package, so it must be importable.
        # autodoc + napoleon ship in Sphinx core (see docs/requirements.txt).
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install -r docs/requirements.txt

      - name: Build docs (warnings = errors)
        run: sphinx-build -W -b html docs docs/_build/html
